[pytest]
# Default options applied every time pytest runs
addopts = -v --html=reports/report.html --self-contained-html

# Directory where pytest will look for tests
testpaths = tests

# Naming conventions for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers for grouping tests
markers =
    smoke: quick validation tests
    regression: full suite for release
    cart: tests related to cart functionality
    checkout: tests related to checkout flow